<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MELİSAXSLOW ♥ DADDYXSLOW</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
height:100vh;
overflow:hidden;
color:white;
background:black;
}

/* VIDEO */

#bgVideo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-3;
}

/* DARK OVERLAY */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
z-index:-2;
}

/* CENTER BOX */

.centerBox{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
padding:50px;
backdrop-filter:blur(10px);
background:rgba(0,0,0,0.35);
border-radius:20px;
box-shadow:0 0 40px rgba(255,0,120,0.5);
}

/* TITLE */

#title{
font-family:'Orbitron',sans-serif;
font-size:3.5rem;
letter-spacing:4px;
margin-bottom:20px;
color:#ff4d8d;

text-shadow:
0 0 10px #ff4d8d,
0 0 20px #ff4d8d,
0 0 40px #ff4d8d;
}

/* LOVE TEXT */

#loveText{
font-size:18px;
opacity:0.85;
margin-bottom:30px;
min-height:25px;
}

/* BUTTON */

#loveBtn{

padding:15px 35px;
font-size:16px;
border:none;
border-radius:40px;
cursor:pointer;

background:linear-gradient(45deg,#ff2d75,#ff8fa3);

color:white;

transition:0.3s;

box-shadow:0 0 20px rgba(255,0,120,0.7);

}

#loveBtn:hover{

transform:scale(1.1);

box-shadow:
0 0 20px #ff4d8d,
0 0 40px #ff4d8d,
0 0 80px #ff4d8d;

}

/* CANVAS */

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:-1;
}

</style>

</head>

<body>

<!-- VIDEO -->

<video autoplay muted loop id="bgVideo">
<source src="assets/video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- EFFECTS -->

<canvas id="matrix"></canvas>
<canvas id="particles"></canvas>
<canvas id="cursor"></canvas>

<!-- MUSIC -->

<audio id="music" loop>
<source src="assets/music.mp3" type="audio/mpeg">
</audio>

<!-- CENTER CONTENT -->

<div class="centerBox">

<h1 id="title">MELİSAXSLOW</h1>

<p id="loveText"></p>

<button id="loveBtn" onclick="secret()">
♥ MELİSAXSLOW ♥ DADDYXSLOW ♥
</button>

</div>

<script>

/* TYPE WRITER EFFECT */

let text="Sonsuza kadar birlikte... ♥";

let i=0;

function typing(){

if(i<text.length){

document.getElementById("loveText").innerHTML+=text.charAt(i);

i++;

setTimeout(typing,80);

}

}

typing();

/* MUSIC AUTO START */

document.body.addEventListener("click",()=>{

document.getElementById("music").play();

},{once:true});

/* SECRET BUTTON */

function secret(){

alert("Seni Seviyorum ♥");

}

</script>

</body>
</html>
